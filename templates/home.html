<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech Platform - Learn with 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #canvas { width: 100%; height: 100vh; display: block; }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; z-index: 10;
        }
        .overlay h1 { font-size: 3rem; margin-bottom: 1rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .overlay p { font-size: 1.2rem; margin-bottom: 2rem; opacity: 0.9; }
        .btn {
            padding: 12px 30px; background: #6366f1; color: white; border: none;
            border-radius: 8px; font-size: 1.1rem; cursor: pointer; text-decoration: none;
            transition: 0.3s; display: inline-block;
        }
        .btn:hover { background: #4f46e5; transform: scale(1.05); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay">
        <h1>Welcome to EdTech Platform</h1>
        <p>Learn with Interactive 3D Experience</p>
        <a href="/accounts/login/" class="btn">Login with Google</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 5;

        // Create rotating 3D cube
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshPhongMaterial({ color: 0x6366f1, shininess: 100 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // Lighting
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 5-second auto animation
        let startTime = Date.now();
        const animationDuration = 5000; // 5 seconds

        function animate() {
            let elapsed = Date.now() - startTime;
            
            if (elapsed < animationDuration) {
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.02;
                cube.scale.setScalar(1 + Math.sin(elapsed * 0.005) * 0.2);
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            } else {
                // After 5s, stop rotation and keep static
                cube.rotation.x = Math.PI / 4;
                cube.rotation.y = Math.PI / 4;
                renderer.render(scene, camera);
            }
        }
        animate();

        // Responsive resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
