<!DOCTYPE html>
<html>
<head>
    <title>Dinesh EdTech Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f5f5f5; }
        .header { background:#2563eb; color:white; padding:20px; border-radius:8px; margin-bottom:30px; }
        .course-card { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:20px; }
        .btn { padding:10px 20px; background:#10b981; color:white; text-decoration:none; border-radius:5px; display:inline-block; margin-top:10px; }
        #canvas { width:100%; height:300px; background:#1a1a1a; border-radius:8px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>Welcome, {{ user.email }}</h1>
        <p>Python Full Stack Development Course</p>
    </div>

    <div class="course-card">
        <h3>Course 1: Python Basics</h3>
        <p>Learn Python fundamentals with interactive 3D visualizations</p>
        <div id="canvas"></div>
        <a href="{% url 'download_certificate' 1 %}" class="btn">Download Certificate</a>
    </div>

    <a href="/admin/" class="btn" style="background:#6b7280;">Admin Panel</a>
    <a href="/accounts/logout/" class="btn" style="background:#ef4444;">Logout</a>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 2, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(document.getElementById('canvas').clientWidth, 300);
        document.getElementById('canvas').appendChild(renderer.domElement);
        
        const geometry = new THREE.TorusGeometry(1, 0.4, 16, 100);
        const material = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe:true });
        const torus = new THREE.Mesh(geometry, material);
        scene.add(torus);
        camera.position.z = 4;
        
        function animate() {
            requestAnimationFrame(animate);
            torus.rotation.x += 0.01;
            torus.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
